components:
  schemas:
    EventCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - id
      - name
      - slug
    EventCheckin:
      type: object
      properties:
        qr_token:
          type: string
      required:
      - qr_token
    EventRead:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organizer:
          type: integer
        category:
          allOf:
          - $ref: '#/components/schemas/EventCategory'
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        event_date:
          type: string
          format: date-time
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        difficulty_coef:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
        base_points:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        max_participants:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        status:
          $ref: '#/components/schemas/EventStatusEnum'
        participants_count:
          type: integer
          readOnly: true
        prizes:
          type: array
          items:
            $ref: '#/components/schemas/Prize'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - base_points
      - category
      - created_at
      - difficulty_coef
      - event_date
      - event_type
      - id
      - max_participants
      - name
      - organizer
      - participants_count
      - prizes
      - updated_at
    EventRegisterResponse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ParticipationStatusEnum'
          readOnly: true
        qr_token:
          type: string
          readOnly: true
          nullable: true
        points_awarded:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - event
      - id
      - points_awarded
      - qr_token
      - status
      - user
    EventStatusEnum:
      enum:
      - DRAFT
      - PUBLISHED
      - ONGOING
      - COMPLETED
      - CANCELLED
      type: string
      description: |-
        * `DRAFT` - Draft
        * `PUBLISHED` - Published
        * `ONGOING` - Ongoing
        * `COMPLETED` - Completed
        * `CANCELLED` - Cancelled
    EventTypeEnum:
      enum:
      - LECTURE
      - HACKATHON
      - FORUM
      - VOLUNTEER
      - WORKSHOP
      type: string
      description: |-
        * `LECTURE` - Lecture
        * `HACKATHON` - Hackathon
        * `FORUM` - Forum
        * `VOLUNTEER` - Volunteer
        * `WORKSHOP` - Workshop
    EventWrite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organizer:
          type: integer
          readOnly: true
        category:
          type: integer
        name:
          type: string
          maxLength: 255
        description:
          type: string
        event_date:
          type: string
          format: date-time
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        difficulty_coef:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
        base_points:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        max_participants:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        status:
          $ref: '#/components/schemas/EventStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - base_points
      - category
      - created_at
      - difficulty_coef
      - event_date
      - event_type
      - id
      - max_participants
      - name
      - organizer
      - updated_at
    Participation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ParticipationStatusEnum'
          readOnly: true
        checked_in_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        confirmed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        points_awarded:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - checked_in_at
      - confirmed_at
      - created_at
      - event
      - id
      - points_awarded
      - status
      - user
    ParticipationStatusEnum:
      enum:
      - REGISTERED
      - CHECKED_IN
      - CONFIRMED
      - REJECTED
      type: string
      description: |-
        * `REGISTERED` - Registered
        * `CHECKED_IN` - Checked In
        * `CONFIRMED` - Confirmed
        * `REJECTED` - Rejected
    PatchedEventWrite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organizer:
          type: integer
          readOnly: true
        category:
          type: integer
        name:
          type: string
          maxLength: 255
        description:
          type: string
        event_date:
          type: string
          format: date-time
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        difficulty_coef:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
        base_points:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        max_participants:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        status:
          $ref: '#/components/schemas/EventStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Prize:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        prize_type:
          $ref: '#/components/schemas/PrizeTypeEnum'
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - event
      - id
      - name
      - prize_type
      - quantity
    PrizeTypeEnum:
      enum:
      - MERCH
      - TICKETS
      - INTERNSHIP
      - GRANT
      - MEETING
      type: string
      description: |-
        * `MERCH` - Merch
        * `TICKETS` - Tickets
        * `INTERNSHIP` - Internship
        * `GRANT` - Grant
        * `MEETING` - Meeting
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
