      - in: query
        name: date_to
        schema:
          type: string
          format: date-time
      - in: query
        name: event_type
        schema:
          type: string
          enum:
          - FORUM
          - HACKATHON
          - LECTURE
          - VOLUNTEER
          - WORKSHOP
        description: |-
          * `LECTURE` - Lecture
          * `HACKATHON` - Hackathon
          * `FORUM` - Forum
          * `VOLUNTEER` - Volunteer
          * `WORKSHOP` - Workshop
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: organizer_id
        schema:
          type: number
      - in: query
        name: status
        schema:
          type: string
          enum:
          - CANCELLED
          - COMPLETED
          - DRAFT
          - ONGOING
          - PUBLISHED
        description: |-
          * `DRAFT` - Draft
          * `PUBLISHED` - Published
          * `ONGOING` - Ongoing
          * `COMPLETED` - Completed
          * `CANCELLED` - Cancelled
      tags:
      - Мероприятия
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participation'
          description: ''
  /api/v1/events/{id}/prizes/:
