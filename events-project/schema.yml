  /api/v1/events/{id}/register/:
    post:
      operationId: v1_events_register_create
      description: Регистрирует текущего участника на выбранное мероприятие и выдает
        QR-токен.
      summary: Записаться на мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Мероприятия
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventRegisterResponse'
          description: ''
        '400':
