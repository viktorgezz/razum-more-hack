  /api/v1/events/:
    get:
      operationId: v1_events_list
      description: Возвращает список мероприятий с фильтрацией и сортировкой.
      summary: Получить список мероприятий
      parameters:
      - in: query
        name: category
        schema:
          type: number
      - in: query
        name: date_from
        schema:
          type: string
          format: date-time
      - in: query
        name: date_to
        schema:
          type: string
          format: date-time
      - in: query
        name: event_type
        schema:
          type: string
          enum:
          - FORUM
          - HACKATHON
          - LECTURE
          - VOLUNTEER
          - WORKSHOP
        description: |-
          * `LECTURE` - Lecture
          * `HACKATHON` - Hackathon
          * `FORUM` - Forum
          * `VOLUNTEER` - Volunteer
          * `WORKSHOP` - Workshop
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: organizer_id
        schema:
          type: number
      - in: query
        name: status
        schema:
          type: string
          enum:
          - CANCELLED
          - COMPLETED
          - DRAFT
          - ONGOING
          - PUBLISHED
        description: |-
          * `DRAFT` - Draft
          * `PUBLISHED` - Published
          * `ONGOING` - Ongoing
          * `COMPLETED` - Completed
          * `CANCELLED` - Cancelled
      tags:
      - Мероприятия
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventRead'
          description: ''
    post:
      operationId: v1_events_create
      description: Создает новое мероприятие. Доступно организатору или администратору.
      summary: Создать мероприятие
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventWrite'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventWrite'
          description: ''
  /api/v1/events/{id}/:
    get:
      operationId: v1_events_retrieve
      description: Возвращает детальную информацию по выбранному мероприятию.
      summary: Получить карточку мероприятия
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Мероприятия
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventRead'
          description: ''
    put:
      operationId: v1_events_update
      description: Полностью обновляет карточку мероприятия.
      summary: Обновить мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventWrite'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventWrite'
          description: ''
    patch:
      operationId: v1_events_partial_update
      description: Частично обновляет поля карточки мероприятия.
      summary: Частично обновить мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEventWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEventWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEventWrite'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventWrite'
          description: ''
    delete:
      operationId: v1_events_destroy
      description: Удаляет мероприятие.
      summary: Удалить мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Мероприятия
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/events/{id}/checkin/:
    post:
      operationId: v1_events_checkin_create
      description: Проводит check-in участника по QR-токену.
      summary: Отметиться на мероприятии
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCheckin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCheckin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCheckin'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventRegisterResponse'
          description: ''
  /api/v1/events/{id}/confirm/{user_id}/:
    post:
      operationId: v1_events_confirm_create
      description: Подтверждает участие выбранного участника организатором или администратором.
      summary: Подтвердить участие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this event.
        required: true
      - in: path
        name: user_id
        schema:
          type: integer
        description: ID участника
        required: true
      tags:
      - Мероприятия
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventRegisterResponse'
          description: ''
  /api/v1/events/{id}/participants/:
    get:
      operationId: v1_events_participants_list
      description: Возвращает список регистраций участников для выбранного мероприятия.
      summary: Получить список участников мероприятия
      parameters:
