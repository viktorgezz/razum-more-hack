openapi: 3.0.3
info:
  title: Платформа рейтинга активности молодёжного парламента
  version: 1.0.0
  description: "\n## О проекте\nВеб-платформа для учёта активности участников и формирования
    прозрачного рейтинга кандидатов.\n## Роли пользователей\n- **ORGANIZER** — создаёт
    мероприятия, верифицирует участие\n- **PARTICIPANT** — участвует в мероприятиях,
    копит баллы\n- **OBSERVER** — просматривает рейтинг, отбирает кандидатов\n- **ADMIN**
    — управляет платформой, настраивает веса баллов\n## Аутентификация\nЗащищённые
    эндпоинты требуют JWT в заголовке:\n`Authorization: Bearer <token>`\n    "
paths:
  /api/admin/organizers/{user_id}/approve/:
    post:
      operationId: admin_organizers_approve_create
      description: Выдаёт права организатора (is_staff=True и роль ORGANIZER).
      summary: Одобрить организатора
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Admin Panel
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizerModeration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizerModeration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizerModeration'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizerModeration'
          description: ''
  /api/admin/organizers/{user_id}/reject/:
    post:
      operationId: admin_organizers_reject_create
      description: Снимает права организатора (is_staff=False, при необходимости роль
        PARTICIPANT).
      summary: Отклонить организатора
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Admin Panel
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizerModeration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizerModeration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizerModeration'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizerModeration'
          description: ''
  /api/admin/organizers/pending/:
    get:
      operationId: admin_organizers_pending_list
      description: Пользователи, ожидающие модерации организатора.
      summary: Кандидаты в организаторы
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Admin Panel
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPendingOrganizerList'
          description: ''
  /api/admin/point-weights/:
    get:
      operationId: admin_point_weights_list
      description: Текущие веса по типам мероприятий и категориям.
      summary: Список весов баллов
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Admin Panel
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPointWeightReadList'
          description: ''
  /api/admin/point-weights/{weight_id}/:
    patch:
      operationId: admin_point_weights_partial_update
      description: Обновляет PointWeight и проставляет updated_by текущим администратором.
      summary: Обновить вес баллов
      parameters:
      - in: path
        name: weight_id
        schema:
          type: integer
        required: true
      tags:
      - Admin Panel
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPointWeightPatch'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPointWeightPatch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPointWeightPatch'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PointWeightRead'
          description: ''
  /api/events/:
    get:
      operationId: events_list
      description: Лента мероприятий с пагинацией, фильтрацией и сортировкой.
      summary: Список мероприятий
      parameters:
      - in: query
        name: category
        schema:
          type: string
        description: Слаг направления
      - in: query
        name: date_from
        schema:
          type: string
        description: Начало периода (YYYY-MM-DD)
      - in: query
        name: date_to
        schema:
          type: string
        description: Конец периода (YYYY-MM-DD)
      - in: query
        name: event_type
        schema:
          type: string
        description: Тип мероприятия
      - in: query
        name: ordering
        schema:
          type: string
        description: Поле сортировки
      - in: query
        name: organizer_id
        schema:
          type: integer
        description: ID организатора
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
        description: Статус мероприятия
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
          description: ''
    post:
      operationId: events_create
      description: Доступно организатору или администратору. Организатором записи
        становится текущий пользователь.
      summary: Создать мероприятие
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/events/{id}/:
    get:
      operationId: events_retrieve
      description: Подробная информация о мероприятии и связанных призах.
      summary: Карточка мероприятия
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    put:
      operationId: events_update
      description: Полное обновление карточки мероприятия его организатором или администратором.
      summary: Полная замена мероприятия
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    patch:
      operationId: events_partial_update
      description: Частичное обновление карточки мероприятия его организатором или
        администратором.
      summary: Частичное обновление мероприятия
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    delete:
      operationId: events_destroy
      description: Удаление мероприятия его организатором или администратором.
      summary: Удалить мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/events/{id}/checkin/:
    post:
      operationId: events_checkin_create
      description: Подтверждает присутствие участника на мероприятии по QR-токену.
      summary: Отметиться по QR
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCheckInRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCheckInRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCheckInRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
  /api/events/{id}/confirm/{user_id}/:
    post:
      operationId: events_confirm_create
      description: Организатор или администратор подтверждает участие пользователя
        и начисляет баллы.
      summary: Подтвердить участие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - in: path
        name: user_id
        schema:
          type: integer
        description: ID участника для подтверждения
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
  /api/events/{id}/participants/:
    get:
      operationId: events_participants_list
      description: Регистрации на мероприятие. Доступно организатору события и администратору.
      summary: Список участников
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedParticipationList'
          description: ''
  /api/events/{id}/prizes/:
    get:
      operationId: events_prizes_list
      description: GET — призы мероприятия. POST — добавление приза организатором
        или администратором.
      summary: Список или создание призов
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPrizeList'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prize'
          description: ''
    post:
      operationId: events_prizes_create
      description: GET — призы мероприятия. POST — добавление приза организатором
        или администратором.
      summary: Список или создание призов
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prize'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Prize'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Prize'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPrizeList'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prize'
          description: ''
  /api/events/{id}/register/:
    post:
      operationId: events_register_create
      description: Создаёт заявку на участие и QR-токен для последующего чекина.
      summary: Записаться на мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
  /api/inspector/candidates/:
    get:
      operationId: inspector_candidates_list
      description: Участники с расширенной фильтрацией для кадровой службы.
      summary: Список кандидатов
      parameters:
      - in: query
        name: max_avg_points
        schema:
          type: number
          format: double
        description: Максимальный средний балл
      - in: query
        name: max_events
        schema:
          type: integer
        description: Максимум мероприятий
      - in: query
        name: min_avg_points
        schema:
          type: number
          format: double
        description: Минимальный средний балл
      - in: query
        name: min_events
        schema:
          type: integer
        description: Минимум мероприятий
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Сортировка: total_points, avg_points, events_count, date_joined
          и варианты с ''-'''
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Reserve Inspector
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCandidateListList'
          description: ''
  /api/inspector/candidates/{user_id}/report/:
    get:
      operationId: inspector_candidates_report_retrieve
      description: Скачивание PDF со статистикой и последними участиями кандидата.
      summary: PDF-отчёт по кандидату
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Reserve Inspector
      security:
      - jwtAuth: []
      responses:
        '200':
          description: PDF-файл отчёта
        '404':
          description: Кандидат не найден
  /api/token/:
    post:
      operationId: token_create
      description: Возвращает access и refresh по логину и паролю.
      summary: Получить JWT-токены
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: Возвращает новый access по действующему refresh-токену.
      summary: Обновить access-токен
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/organizers/:
    get:
      operationId: v1_organizers_list
      description: Верифицированные организаторы платформы с числом проведённых мероприятий.
      summary: Список организаторов
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Organizer Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizerListList'
          description: ''
  /api/v1/organizers/{id}/:
    get:
      operationId: v1_organizers_retrieve
      description: Статистика мероприятий, средний рейтинг доверия и типичные призы.
      summary: Публичный профиль организатора
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Organizer Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizerProfile'
          description: ''
  /api/v1/organizers/{id}/events/:
    get:
      operationId: v1_organizers_events_list
      description: Все мероприятия, созданные выбранным организатором.
      summary: Мероприятия организатора
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Organizer Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizerEventList'
          description: ''
  /api/v1/organizers/{id}/reviews/:
    get:
      operationId: v1_organizers_reviews_list
      description: Отзывы участников с оценками от 1 до 5.
      summary: Отзывы об организаторе
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Organizer Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizerReviewList'
          description: ''
  /api/v1/organizers/{id}/reviews/{review_id}/:
    delete:
      operationId: v1_organizers_reviews_destroy
      description: Участник может удалить только свой отзыв.
      summary: Удалить свой отзыв
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: review_id
        schema:
          type: integer
        required: true
      tags:
      - Organizer Profiles
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/organizers/{id}/reviews/create/:
    post:
      operationId: v1_organizers_reviews_create_create
      description: 'Только для участников: один отзыв на мероприятие при подтверждённом
        участии.'
      summary: Оставить отзыв
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Organizer Profiles
      requestBody:
        content:
          application/json:
            schema:
