tags:
- name: Аутентификация
  description: Получение и обновление JWT-токенов для доступа к защищённым эндпоинтам.
- name: Мероприятия
  description: Создание и управление мероприятиями, регистрация участников, чекин
    по QR и выдача призов.
- name: Рейтинговая система
  description: 'Расчёт рейтинга участников, таблица лидеров и настройка весов баллов.
    Рейтинг считается по формуле: сумма(баллы × коэффициент_сложности × вес_типа).
    Поддерживается фильтрация по направлениям: IT, Социальное проектирование, Медиа.'
- name: Профиль организатора
  description: Публичные страницы организаторов, их мероприятия и система отзывов.
    Рейтинг доверия организатора рассчитывается как среднее оценок от участников.
    Оставить отзыв может только участник с подтверждённым участием в мероприятии.
- name: Инспектор кадрового резерва
  description: Расширенный поиск и отбор кандидатов для кадровой службы с возможностью
    выгрузки PDF-отчётов.
