          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        rating_media:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        common_rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        rank:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        snapshot_date:
          type: string
          format: date
          readOnly: true
      required:
      - first_name
      - id
      - last_name
      - snapshot_date
      - user
      - username
    RebuildLeaderboardResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
      required:
      - message
      - status
    Status43fEnum:
      enum:
      - DRAFT
      - PUBLISHED
      - ONGOING
      - COMPLETED
      - CANCELLED
      type: string
      description: |-
        * `DRAFT` - Черновик
        * `PUBLISHED` - Опубликовано
        * `ONGOING` - Идёт
        * `COMPLETED` - Завершено
        * `CANCELLED` - Отменено
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
