components:
  schemas:
    CandidateList:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        date_joined:
          type: string
          format: date-time
        events_count:
          type: integer
        confirmed_count:
          type: integer
        total_points:
          type: integer
        avg_points:
          type: number
          format: double
      required:
      - avg_points
      - confirmed_count
      - date_joined
      - email
      - events_count
      - first_name
      - id
      - last_name
      - total_points
      - username
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        organizer_id:
          type: integer
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/EventCategory'
          readOnly: true
        category_id:
          type: integer
          writeOnly: true
          nullable: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        event_date:
          type: string
          format: date-time
        event_type:
          $ref: '#/components/schemas/EventTypeEbeEnum'
        difficulty_coef:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
        base_points:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        max_participants:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        status:
          $ref: '#/components/schemas/Status43fEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        prizes:
          type: array
          items:
            $ref: '#/components/schemas/Prize'
          readOnly: true
      required:
      - category
      - created_at
      - event_date
      - event_type
      - id
      - name
      - organizer_id
      - prizes
    EventCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
      required:
      - id
      - name
      - slug
    EventCheckInRequest:
      type: object
      properties:
        qr_token:
          type: string
      required:
      - qr_token
    EventTypeB5cEnum:
      enum:
      - LECTURE
      - HACKATHON
      - FORUM
      - VOLUNTEER
      type: string
      description: |-
        * `LECTURE` - Лекция
        * `HACKATHON` - Хакатон
        * `FORUM` - Форум
        * `VOLUNTEER` - Волонтёрство
    EventTypeEbeEnum:
      enum:
      - LECTURE
      - HACKATHON
      - FORUM
      - VOLUNTEER
      - OTHER
