openapi: 3.0.3
info:
  title: Платформа рейтинга активности молодёжного парламента
  version: 1.0.0
  description: "\n## О проекте\nВеб-платформа для автоматизации учёта активности участников
    молодёжного парламента и формирования прозрачного рейтинга кандидатов.\n## Роли
    пользователей\n- **ORGANIZER** — создаёт мероприятия, верифицирует участие\n-
    **PARTICIPANT** — участвует в мероприятиях, копит баллы\n- **OBSERVER** — просматривает
    рейтинг, отбирает кандидатов\n- **ADMIN** — управляет платформой, настраивает
    веса баллов\n## Аутентификация\nВсе эндпоинты требуют JWT-токен в заголовке:\n`Authorization:
    Bearer <token>`\n    "
paths:
  /api/events/:
    get:
      operationId: events_list
      description: Возвращает ленту мероприятий с пагинацией, фильтрацией и сортировкой.
      summary: Список мероприятий
      parameters:
      - in: query
        name: category
        schema:
          type: string
        description: Slug направления
      - in: query
        name: date_from
        schema:
          type: string
        description: Дата начала периода в формате YYYY-MM-DD
      - in: query
        name: date_to
        schema:
          type: string
        description: Дата конца периода в формате YYYY-MM-DD
      - in: query
        name: event_type
        schema:
          type: string
        description: Тип мероприятия
      - in: query
        name: ordering
        schema:
          type: string
        description: Поле сортировки
      - in: query
        name: organizer_id
        schema:
          type: integer
        description: ID организатора
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
        description: Статус мероприятия
      tags:
      - Мероприятия
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
          description: ''
    post:
      operationId: events_create
      description: Доступно организатору или администратору. Организатором записи
        становится текущий пользователь.
      summary: Создать мероприятие
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/events/{id}/:
    get:
      operationId: events_retrieve
      description: Детальная информация о мероприятии и связанных призах.
      summary: Карточка мероприятия
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Мероприятия
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    put:
      operationId: events_update
      description: 'Мероприятия: CRUD, регистрация, чекин и подтверждение участия.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    patch:
      operationId: events_partial_update
      description: Частичное обновление карточки мероприятия его организатором или
        администратором.
      summary: Обновить мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEvent'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    delete:
      operationId: events_destroy
      description: Удаление мероприятия его организатором или администратором.
      summary: Удалить мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Мероприятия
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/events/{id}/checkin/:
    post:
      operationId: events_checkin_create
      description: Подтверждает факт присутствия участника на мероприятии по QR-токену.
      summary: Отметиться по QR
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCheckInRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCheckInRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCheckInRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
  /api/events/{id}/confirm/{user_id}/:
    post:
      operationId: events_confirm_create
      description: Организатор или администратор подтверждает участие конкретного
        пользователя и начисляет баллы.
      summary: Подтвердить участие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - in: path
        name: user_id
        schema:
          type: integer
        description: ID участника для подтверждения
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
  /api/events/{id}/participants/:
    get:
      operationId: events_participants_list
      description: Список регистраций на мероприятие. Доступен организатору события
        и администратору.
      summary: Список участников
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Мероприятия
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedParticipationList'
          description: ''
  /api/events/{id}/prizes/:
    get:
      operationId: events_prizes_list
      description: GET возвращает призы мероприятия. POST добавляет новый приз организатором
        или администратором.
      summary: Список или создание призов
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Мероприятия
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPrizeList'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prize'
          description: ''
    post:
      operationId: events_prizes_create
      description: GET возвращает призы мероприятия. POST добавляет новый приз организатором
        или администратором.
      summary: Список или создание призов
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prize'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Prize'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Prize'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPrizeList'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prize'
          description: ''
  /api/events/{id}/register/:
    post:
      operationId: events_register_create
      description: Создаёт заявку на участие и QR-токен для последующего чекина.
      summary: Записаться на мероприятие
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - Мероприятия
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participation'
          description: ''
  /api/inspector/candidates/:
    get:
      operationId: inspector_candidates_list
      description: Список участников с расширенной фильтрацией для кадровой службы.
      summary: Список кандидатов
      parameters:
      - in: query
        name: max_avg_points
        schema:
          type: number
          format: double
        description: Максимальный средний балл
      - in: query
        name: max_events
        schema:
          type: integer
        description: Максимум мероприятий
      - in: query
        name: min_avg_points
        schema:
          type: number
          format: double
        description: Минимальный средний балл
      - in: query
        name: min_events
        schema:
          type: integer
        description: Минимум мероприятий
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Сортировка: total_points, avg_points, events_count, date_joined
          и варианты с ''-'''
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Инспектор кадрового резерва
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCandidateListList'
          description: ''
  /api/inspector/candidates/{user_id}/report/:
    get:
      operationId: inspector_candidates_report_retrieve
      description: Скачивание PDF-отчёта с краткой статистикой и последними участиями
        кандидата.
      summary: PDF-отчёт по кандидату
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Инспектор кадрового резерва
      security:
      - jwtAuth: []
      responses:
        '200':
          description: PDF-файл отчёта
        '404':
          description: Кандидат не найден
  /api/token/:
    post:
      operationId: token_create
      description: Возвращает access и refresh токены по логину и паролю пользователя.
      summary: Получить JWT-токены
      tags:
      - Аутентификация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: Возвращает новый access-токен по действующему refresh-токену.
      summary: Обновить access-токен
      tags:
      - Аутентификация
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/organizers/:
    get:
      operationId: v1_organizers_list
      description: Все верифицированные организаторы платформы с количеством проведённых
        мероприятий.
      summary: Список организаторов
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Профиль организатора
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizerListList'
          description: ''
  /api/v1/organizers/{id}/:
    get:
      operationId: v1_organizers_retrieve
      description: 'Подробная страница организатора: статистика мероприятий, средний
        рейтинг доверия и типичные призы.'
      summary: Публичный профиль организатора
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Профиль организатора
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizerProfile'
          description: ''
  /api/v1/organizers/{id}/events/:
    get:
      operationId: v1_organizers_events_list
      description: Список всех мероприятий, проведённых данным организатором.
      summary: Мероприятия организатора
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Профиль организатора
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizerEventList'
          description: ''
  /api/v1/organizers/{id}/reviews/:
    get:
      operationId: v1_organizers_reviews_list
      description: Отзывы участников об организаторе с оценками от 1 до 5.
      summary: Отзывы об организаторе
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Профиль организатора
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizerReviewList'
          description: ''
  /api/v1/organizers/{id}/reviews/{review_id}/:
    delete:
      operationId: v1_organizers_reviews_destroy
      description: Участник может удалить только свой собственный отзыв.
      summary: Удалить свой отзыв
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: review_id
        schema:
          type: integer
        required: true
      tags:
      - Профиль организатора
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/organizers/{id}/reviews/create/:
    post:
      operationId: v1_organizers_reviews_create_create
      description: Только для участников. Можно оставить один отзыв на мероприятие
        при условии подтверждённого участия.
      summary: Оставить отзыв
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Профиль организатора
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizerReviewCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizerReviewCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizerReviewCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizerReview'
          description: ''
  /api/v1/ratings/leaderboard/:
    get:
      operationId: v1_ratings_leaderboard_list
      description: Возвращает топ-100 участников по рейтингу. Можно фильтровать по
        направлению.
      summary: Таблица лидеров
      parameters:
      - in: query
        name: category
        schema:
          type: string
          enum:
          - it
          - media
          - social
        description: Направление для фильтрации рейтинга
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Рейтинговая система
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRatingSnapshotList'
          description: ''
  /api/v1/ratings/point-weights/:
    get:
      operationId: v1_ratings_point_weights_list
      description: Коэффициенты для разных типов мероприятий, которые используются
        при расчёте рейтинга.
      summary: Список весов баллов
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Рейтинговая система
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPointWeightList'
          description: ''
  /api/v1/ratings/point-weights/{id}/:
    put:
      operationId: v1_ratings_point_weights_update
      description: Только для администраторов. Позволяет настроить коэффициент для
        конкретного типа мероприятия.
      summary: Изменить вес баллов
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Рейтинговая система
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PointWeight'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PointWeight'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PointWeight'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PointWeight'
          description: ''
    patch:
      operationId: v1_ratings_point_weights_partial_update
      description: Только для администраторов. Позволяет настроить коэффициент для
        конкретного типа мероприятия.
      summary: Изменить вес баллов
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Рейтинговая система
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPointWeight'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPointWeight'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPointWeight'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PointWeight'
          description: ''
  /api/v1/ratings/rebuild/:
    post:
      operationId: v1_ratings_rebuild_create
      description: Только для администраторов. Пересчитывает рейтинг всех участников
        и обновляет места в таблице.
      summary: Принудительный пересчёт рейтинга
      tags:
      - Рейтинговая система
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildLeaderboardResponse'
          description: ''
  /api/v1/ratings/user/{user_id}/:
    get:
      operationId: v1_ratings_user_retrieve
      description: Возвращает детальный рейтинг участника по всем направлениям и его
        место в общем зачёте.
      summary: Рейтинг пользователя
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
